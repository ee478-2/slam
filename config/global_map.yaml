# Unified semantic/global map for the EE478 room map.
#
# Primary global coordinates come from EE478_MAP_INFO, while AprilTag bundle
# layouts and signboard semantics are centralized here for runtime consumers.

metadata:
  map_name: ee478_n1_room113
  frame_id: map
  primary_coordinate_source: slam/EE478_MAP_INFO/ee478_n1_room113.yaml
  store_coordinate_source: slam/EE478_MAP_INFO/store_xy.yaml
  tag_layout_source: slam/localization_manager/config/tags.yaml
  coordinate_convention:
    x: forward in ROS map frame
    y: left in ROS map frame
    z: up in ROS map frame
    yaw_deg: 0 deg faces +X and follows the right-hand rule

